version: "3.9"

# ── Shared env for both application services ──────────────────────────────────
x-app-env: &app-env
  DATABASE_URL: postgres://clawplane:clawplane@postgres:5432/clawplane?sslmode=disable
  REPOSITORY_DRIVER: postgres
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ""
  REDIS_QUEUE: clawplane:jobs
  LOG_LEVEL: info
  DEVELOPMENT_AUTH: "false"
  DEFAULT_INGRESS_HOST: apps.localhost
  JOB_MAX_ATTEMPTS: "5"
  JOB_RETRY_BACKOFF: 2s
  DB_MAX_OPEN_CONNS: "20"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: 30m
  DB_CONN_MAX_IDLE_TIME: 10m

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clawplane
      POSTGRES_USER: clawplane
      POSTGRES_PASSWORD: clawplane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawplane"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Migrations (runs once, then exits) ────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: api          # reuse the api image which contains the migrate binary
    command: ["./migrate"]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        VERSION: "${VERSION:-dev}"
        COMMIT: "${COMMIT:-unknown}"
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
      HTTP_ADDR: ":8080"
      MEDIUM_CLIENT_ID: "${MEDIUM_CLIENT_ID:-dev-medium-client}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Worker ────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
      args:
        VERSION: "${VERSION:-dev}"
        COMMIT: "${COMMIT:-unknown}"
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
